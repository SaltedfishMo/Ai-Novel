name: Sync Upstream

on:
  schedule:
    - cron: '21 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get current fork HEAD
        id: before
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          before_sha=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/main" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["sha"])')

          echo "before_sha=${before_sha}"
          echo "sha=${before_sha}" >> "$GITHUB_OUTPUT"

      - name: Sync fork main with upstream/main
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -d '{"branch":"main"}')

          echo "HTTP ${http_code}"
          cat "$response_file"
          echo
          echo "http_code=${http_code}" >> "$GITHUB_OUTPUT"

          case "$http_code" in
            200|201|202)
              echo "Upstream sync succeeded or was accepted."
              ;;
            409)
              echo "No sync performed or merge conflict detected. Inspect payload above."
              exit 1
              ;;
            422)
              echo "Validation failed for merge-upstream request. Inspect payload above."
              exit 1
              ;;
            *)
              echo "Unexpected response from merge-upstream API."
              exit 1
              ;;
          esac

      - name: Get updated fork HEAD
        id: after
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          fetch_sha() {
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/main" \
              | python3 -c 'import sys, json; print(json.load(sys.stdin)["sha"])'
          }

          after_sha="${{ steps.before.outputs.sha }}"
          for _ in $(seq 1 12); do
            after_sha=$(fetch_sha)
            if [[ "$after_sha" != "${{ steps.before.outputs.sha }}" ]]; then
              break
            fi
            sleep 5
          done

          echo "after_sha=${after_sha}"
          echo "sha=${after_sha}" >> "$GITHUB_OUTPUT"

      - name: Trigger Docker Publish when main changed
        if: ${{ steps.before.outputs.sha != steps.after.outputs.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/docker-publish.yml/dispatches" \
            -d '{"ref":"main"}')

          echo "HTTP ${http_code}"
          cat "$response_file"
          echo

          if [[ "$http_code" != "204" ]]; then
            echo "Failed to dispatch docker-publish workflow."
            exit 1
          fi

          echo "Triggered docker-publish workflow for updated main."

      - name: Skip Docker Publish when main is unchanged
        if: ${{ steps.before.outputs.sha == steps.after.outputs.sha }}
        run: echo "Fork main did not change after sync; skipping docker-publish dispatch."
